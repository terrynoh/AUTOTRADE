# ── 스크리닝 (09:49 KST) ──────────────────────────────────
screening:
  screening_time: "09:49"             # 스크리닝 실행 시각
  volume_min: 50000000000             # 거래대금 최소 (500억)
  program_net_buy_ratio_min: 5.0      # 프로그램순매수비중 최소 (%)
  program_net_buy_ratio_double: 10.0  # Double/Single 분기 기준 (≥10% = Double)
  max_change_pct: 29.5                # 상한가(+30%) 제외: 이 값 이상 등락률 종목 스킵

# ── 멀티 트레이드 (수익 청산 후 다음 종목) ────────────────
multi_trade:
  enabled: true                        # 멀티 트레이드 활성화
  repeat_start: "10:00"               # 다음 종목 진입 가능 시작 시각
  repeat_end: "11:00"                  # 다음 종목 진입 가능 마감 시각 (last-line defense)
  profit_only: false                   # 청산 사유 무관 다음 종목 진입 허용 (R-08 변경)
  kospi_next_entry_max_pct: 3.8        # KOSPI 다음 종목 tiebreaker 필터 (등락률 상한)
  kosdaq_next_entry_max_pct: 5.6       # KOSDAQ 다음 종목 tiebreaker 필터 (등락률 상한)

# ── 매수 진입 ──────────────────────────────────────────────
entry:
  new_high_watch_start: "09:50"       # 신고가 감시 시작 시각
  entry_deadline: "10:55"             # 매수 진입 마감 (이후 신규 매수 불가)
  high_confirm_drop_pct: 1.0          # 고가 확정 트리거: 고가 대비 N% 하락
  high_confirm_timeout_min: 20        # 고가 확정 후 N분 내 미체결 시 주문 취소 (모멘텀 소멸, 2026-04-10 W-13: 10→20)

  # KOSPI Double (프로그램순매수비중 ≥10%) — 지지력 강, 얕은 눌림
  kospi_double_buy1_pct: 1.9          # 1차 매수
  kospi_double_buy2_pct: 2.4          # 2차 매수 (간격 0.5%)

  # KOSPI Single (프로그램순매수비중 <10%) — 지지력 약, 깊은 눌림
  kospi_single_buy1_pct: 2.5          # 1차 매수
  kospi_single_buy2_pct: 3.5          # 2차 매수 (간격 1.0%)

  # KOSDAQ Double (프로그램순매수비중 ≥10%) — KOSDAQ Single은 매매 제외
  kosdaq_double_buy1_pct: 2.9         # 1차 매수
  kosdaq_double_buy2_pct: 3.9         # 2차 매수 (간격 1.0%)

  # [DEPRECATED] 기존 파라미터 — 하위호환용, 신규 코드는 double/single 사용
  kospi_buy1_pct: 2.5
  kospi_buy2_pct: 3.5
  kosdaq_buy1_pct: 3.5
  kosdaq_buy2_pct: 5.5

  buy1_ratio: 50                      # 1차 매수 비중 (예수금 대비 %)
  buy2_ratio: 50                      # 2차 매수 비중 (예수금 대비 %)

# ── 청산 ───────────────────────────────────────────────────
exit:
  profit_target_recovery_pct: 50      # 고가-저가 50% 회복 시 매도
  timeout_from_low_min: 20            # 눌림 최저가 후 N분 내 목표 미도달 시 청산

  # 하드 손절 — Double/Single 분기 (고가 대비 %)
  kospi_double_hard_stop_pct: 3.0     # KOSPI Double 손절
  kospi_single_hard_stop_pct: 4.0     # KOSPI Single 손절
  kosdaq_double_hard_stop_pct: 4.4    # KOSDAQ Double 손절 (KOSDAQ Single은 매매 제외)

  # [DEPRECATED] 기존 파라미터 — 하위호환용
  kospi_hard_stop_pct: 4.1
  kosdaq_hard_stop_pct: 6.15

  # 선물 급락 손절
  futures_drop_pct: 1.0               # 종목 고점 시각의 선물가 대비 N% 하락 시 청산

  timeout_start_after_kst: "10:00"    # 타임아웃 가드: 이 시각 이전 최저가는 타이머 시작 안 함

  force_liquidate_time: "11:20"

# ── 주문 ───────────────────────────────────────────────────
order:
  slippage_ticks: 2                   # 매수 시 현재가 + N틱 (지정가)
  unfilled_timeout_sec: 30            # 미체결 시 가격 재조정 대기(초)
  max_simultaneous_positions: 1

# ── 리스크 ─────────────────────────────────────────────────
risk:
  daily_loss_limit_pct: 3.0           # 일일 손실 한도 (예수금 대비 %)
  max_position_size_pct: 100          # 최대 포지션 크기 (예수금 대비 %)
  index_drop_halt_pct: 1.5            # 지수(선물) 당일 고점 대비 N% 하락 시 매매 중단
  max_hard_stops_daily: 2             # 일일 손절 횟수 한도 (도달 시 매매 중단)

# ── API ────────────────────────────────────────────────────
api:
  rate_limit_per_sec: 20              # KIS 초당 조회 제한
  screening_start: "09:45"            # 스크리닝 데이터 사전 수집 시작
  polling_interval_sec: 30

# ── 시장 시간 ──────────────────────────────────────────────
market:
  open_time: "09:00"                  # 장 시작
  close_time: "15:30"                 # 장 마감
  report_time: "15:30"                # 마감 리포트 시각

# ── 인프라 ─────────────────────────────────────────────────
infra:
  # HTTP 타임아웃
  http_timeout_total_sec: 10          # REST API 전체 타임아웃
  http_timeout_connect_sec: 5         # REST API 연결 타임아웃
  http_retry_delay_sec: 1.0           # HTTP 재시도 대기

  # WebSocket
  ws_ping_interval_sec: 30            # WebSocket ping 간격
  ws_timeout_sec: 60                  # WebSocket 무응답 판정 기준
  ws_max_backoff_sec: 30.0            # WebSocket 재접속 최대 백오프

  # 헬스체크
  health_check_interval_sec: 5        # 네트워크 헬스체크 주기

  # 대시보드
  dashboard_log_buffer_size: 200      # 대시보드 로그 버퍼 최대 크기
  dashboard_log_return_size: 100      # 클라이언트에 반환할 로그 수

  # 로깅 — 파일당 10MB 롤링, 7일 보관 (최대 ~70MB)
  log_rotation: "10 MB"              # 파일당 최대 10MB, 초과 시 자동 롤링
  log_retention_main: "7 days"       # 전체 로그 보관 기간
  log_retention_trade: "7 days"      # 거래 로그 보관 기간
  log_retention_error: "7 days"      # 에러 로그 보관 기간

  # 상한가 체크
  upper_limit_check_pct: 20.0         # 상한가 체크 대상 등락률 임계값
  upper_limit_multiplier: 1.30        # 상한가 배수 (1.30 = +30%)
