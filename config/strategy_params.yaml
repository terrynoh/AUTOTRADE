# ── 스크리닝 (09:50 KST) ──────────────────────────────────
screening:
  screening_time: "09:50"             # 스크리닝 실행 시각
  volume_min: 50000000000             # 거래대금 최소 (500억)
  program_net_buy_ratio_min: 5.0      # 프로그램순매수비중 최소 (%)
  top_n_gainers: 1                    # 상승률 상위 N종목 선택
  max_change_pct: 29.5                # 상한가(+30%) 제외: 이 값 이상 등락률 종목 스킵
  top_n_candidates: 5                  # 후보 풀 크기 (멀티 트레이드용)

# ── 멀티 트레이드 (수익 청산 후 다음 종목) ────────────────
multi_trade:
  enabled: true                        # 멀티 트레이드 활성화
  max_daily_trades: 3                  # 일일 최대 매매 횟수
  repeat_start: "10:00"               # 다음 종목 진입 가능 시작 시각
  repeat_end: "11:00"                  # 다음 종목 진입 가능 마감 시각
  profit_only: true                    # 수익 청산 시에만 다음 종목 진입 (손절 시 당일 중단)

# ── 매수 진입 ──────────────────────────────────────────────
entry:
  new_high_watch_start: "09:55"       # 신고가 감시 시작 시각
  entry_deadline: "11:00"             # 매수 진입 마감 (이후 신규 매수 불가)
  high_confirm_drop_pct: 1.0          # 고가 확정 트리거: 고가 대비 N% 하락
  high_confirm_timeout_min: 10        # 고가 확정 후 N분 내 미체결 시 주문 취소 (모멘텀 소멸)

  # KOSPI 분할매수 (고가 대비 하락률 %)
  kospi_buy1_pct: 2.5                 # 1차 매수 (예수금 50%)
  kospi_buy2_pct: 3.5                 # 2차 매수 (예수금 50%)

  # KOSDAQ 분할매수
  kosdaq_buy1_pct: 3.75
  kosdaq_buy2_pct: 4.25

  buy1_ratio: 50                      # 1차 매수 비중 (예수금 대비 %)
  buy2_ratio: 50                      # 2차 매수 비중 (예수금 대비 %)

# ── 청산 ───────────────────────────────────────────────────
exit:
  profit_target_recovery_pct: 50      # 고가-저가 50% 회복 시 매도
  timeout_from_low_min: 20            # 눌림 최저가 후 N분 내 목표 미도달 시 청산
  trend_break_check: true             # 1분봉 higher lows 깨지면 청산

  # 하드 손절 (고가 대비 %)
  kospi_hard_stop_pct: 4.5
  kosdaq_hard_stop_pct: 6.5

  # 선물 급락 손절
  futures_drop_pct: 1.0               # 종목 고점 시각의 선물가 대비 N% 하락 시 청산

  force_liquidate_time: "15:20"

# ── 주문 ───────────────────────────────────────────────────
order:
  slippage_ticks: 2                   # 매수 시 현재가 + N틱 (지정가)
  unfilled_timeout_sec: 30            # 미체결 시 가격 재조정 대기(초)
  max_simultaneous_positions: 1

# ── 리스크 ─────────────────────────────────────────────────
risk:
  daily_loss_limit_pct: 3.0           # 일일 손실 한도 (예수금 대비 %)
  max_position_size_pct: 100          # 최대 포지션 크기 (예수금 대비 %)

# ── API ────────────────────────────────────────────────────
api:
  rate_limit_per_sec: 20              # KIS 초당 조회 제한
  screening_start: "09:45"            # 스크리닝 데이터 사전 수집 시작
  polling_interval_sec: 30
